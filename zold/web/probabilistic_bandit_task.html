<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probabilistic Bandit Task</title>

<!-- Self-contained: jsPsych 7.3.4 + plugins loaded from the jsDelivr CDN
     (pinned to exact versions, explicit /dist/index.browser.min.js builds —
     the bare @version form resolves to the CommonJS build, which lacks the
     browser globals). No local jspsych/ folder required. -->
<script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/dist/index.browser.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/css/jspsych.css">
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-text@1.1.3/dist/index.browser.min.js"></script>

<style>
:root {
  --bg:      #16161e;
  --bg2:     #1a1b26;
  --fg:      #ffffff;
  --fg-dim:  #8b95b8;
  --accent:  #7aa2f7;
  --gold:    #e0af68;
  --green:   #9ece6a;
  --red:     #f7768e;
  --neutral: #8b95b8;
  --a:       #5B8DD9;
  --b:       #E8845C;
  --c:       #56B68B;
}

body, .jspsych-display-element {
  background: var(--bg) !important;
  color: var(--fg) !important;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
}
.jspsych-content-wrapper { background: var(--bg) !important; }
.jspsych-content { max-width: 900px !important; padding-top: 64px !important; }

/* ── Header ── */
#bandit-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: 44px; background: var(--bg2);
  display: none; align-items: center;
  justify-content: space-between;
  padding: 0 28px; z-index: 9999;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 17px; font-weight: bold;
  border-bottom: 1px solid #2a2b3d;
}
#bandit-header.visible { display: flex; }
#hdr-trial { color: var(--fg-dim); }
#hdr-score { color: var(--gold); }
#progress-wrap {
  position: fixed; top: 44px; left: 0; right: 0;
  height: 3px; background: #2a2b3d; z-index: 9999; display: none;
}
#progress-wrap.visible { display: block; }
#progress-fill { height: 3px; background: var(--accent); width: 0%; transition: width 0.4s ease; }

/* ── PID screen ── */
.bandit-title { font-size: 30px; font-weight: bold; color: var(--accent); margin-bottom: 6px; text-align: center; }
.bandit-subtitle { font-size: 17px; color: var(--fg-dim); text-align: center; margin-bottom: 32px; }
.jspsych-survey-text-preamble { margin-bottom: 0 !important; }
.jspsych-survey-text input[type=text] {
  background: var(--bg2) !important; color: var(--fg) !important;
  border: 1px solid var(--fg-dim) !important; border-radius: 6px !important;
  padding: 8px 16px !important; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
  font-size: 19px !important; text-align: center !important;
  width: 220px !important; outline: none !important; display: block; margin: 0 auto;
}
.jspsych-survey-text input[type=text]:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 2px rgba(122,162,247,0.2) !important;
}
.jspsych-survey-text label {
  color: var(--fg-dim) !important; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
  font-size: 18px !important; display: block; text-align: center; margin-bottom: 6px;
}
.jspsych-survey-text .jspsych-btn {
  background: var(--accent) !important; color: var(--bg) !important;
  border: none !important; border-radius: 6px !important;
  padding: 10px 34px !important; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
  font-size: 18px !important; font-weight: bold !important;
  cursor: pointer !important; margin-top: 20px !important;
  display: block; margin-left: auto; margin-right: auto;
}
.jspsych-survey-text .jspsych-btn:hover { filter: brightness(1.1); }

/* ── Instructions / buttons ── */
.instr-title { font-size: 26px; font-weight: bold; color: var(--accent); margin-bottom: 20px; text-align: center; }
.instr-body { font-size: 18px; line-height: 1.6; color: var(--fg); max-width: 760px; margin: 0 auto 28px auto; text-align: left; }
.bandit-btn {
  display: inline-block; background: var(--green); color: var(--bg);
  border: none; border-radius: 6px; padding: 12px 40px;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 19px; font-weight: bold;
  cursor: pointer; transition: filter .15s;
}
.bandit-btn:hover { filter: brightness(1.1); }

/* ── Choice prompt ── */
.choice-prompt { font-size: 22px; font-weight: bold; color: var(--fg); margin-bottom: 32px; text-align: center; }

/* ── Slot machine grid ── */
.slot-grid { display: flex; gap: 24px; justify-content: center; align-items: flex-end; margin-top: 8px; }
.slot-machine {
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; user-select: none; transition: filter .15s;
}
.slot-machine:hover .slot-body { filter: brightness(1.15); }
.slot-machine.disabled { cursor: default; pointer-events: none; }

/* ── Animations ── */
@keyframes leverPull {
  0%   { transform: rotate(0deg); }
  30%  { transform: rotate(45deg); }
  60%  { transform: rotate(-10deg); }
  100% { transform: rotate(0deg); }
}
@keyframes reelSpin {
  0%   { transform: translateY(0); }
  25%  { transform: translateY(-8px); }
  50%  { transform: translateY(4px); }
  75%  { transform: translateY(-4px); }
  100% { transform: translateY(0); }
}
@keyframes machineShake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-3px); }
  40%     { transform: translateX(3px); }
  60%     { transform: translateX(-2px); }
  80%     { transform: translateX(2px); }
}
.slot-machine.pulling .lever-arm  { animation: leverPull 0.4s ease-in-out; }
.slot-machine.pulling .reel-strip { animation: reelSpin 0.4s ease-in-out; }
.slot-machine.pulling .slot-body  { animation: machineShake 0.4s ease-in-out; }

/* ── Symbols ── */
.celtic {
  width: 140px; height: 140px;          /* square box */
  padding: 14px; box-sizing: border-box;
  background: #fbfbfd;                   /* near-white */
  border: 2px solid #d0d0d8;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.45);
  transition: border-color .15s, box-shadow .15s;
  display: flex; align-items: center; justify-content: center;
}
.celtic-symbol { width: 100%; height: 100%; object-fit: contain; display: block; }
.slot-machine:hover .celtic {
  border-color: #6f9bd6;
  box-shadow: 0 0 0 3px rgba(80,120,200,0.18), 0 2px 8px rgba(0,0,0,0.5);
}

/* ── Reward feedback badge ── */
.slot-reward {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 24px; font-weight: bold;
  margin-top: 20px; min-height: 36px;
}
.slot-reward.win     { color: var(--green); }
.slot-reward.loss    { color: var(--red); }
.slot-reward.neutral { color: var(--neutral); }
.slot-reward.hidden  { opacity: 0; }

/* ── Inactivity nudge ── */
#inactivity-nudge {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(22,22,30,0.92); z-index: 99999;
  align-items: center; justify-content: center;
}
#inactivity-nudge.visible { display: flex; }
.nudge-box {
  background: var(--bg2); border: 2px solid var(--gold);
  border-radius: 12px; padding: 40px 48px; text-align: center; max-width: 420px;
}
.nudge-title { font-size: 24px; font-weight: bold; color: var(--gold); margin-bottom: 12px; }
.nudge-body  { font-size: 18px; line-height: 1.75; color: var(--fg); margin-bottom: 24px; }
.nudge-timer { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 17px; color: var(--fg-dim); margin-top: 14px; }
.nudge-timer.urgent { color: var(--red); }
.nudge-btn {
  background: var(--gold); color: var(--bg); border: none; border-radius: 6px;
  padding: 10px 32px; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: bold;
  cursor: pointer; transition: filter .15s;
}
.nudge-btn:hover { filter: brightness(1.1); }

/* ── End screen ── */
.end-wrap  { text-align: center; padding-top: 20px; }
.end-title { font-size: 40px; font-weight: bold; color: var(--green); margin-bottom: 14px; }
.end-score { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; color: var(--gold); margin-bottom: 10px; }
.end-stat  { font-size: 17px; color: var(--fg-dim); margin: 4px 0; }
.end-note  { font-size: 17px; color: var(--accent); margin-top: 16px; }
.end-btn {
  margin-top: 28px; padding: 12px 38px; background: var(--accent); color: var(--bg);
  border: none; border-radius: 6px; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 19px; font-weight: bold; cursor: pointer; transition: filter .15s;
}
.end-btn:hover { filter: brightness(1.1); }

/* ── Bandit feedback: points centered, four tilted corner images ── */
.fb-wrap   { position: relative; width: 100%; min-height: 420px; }
.fb-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 56px; font-weight: bold; white-space: nowrap; }
.fb-center.win  { color: var(--green); }
.fb-center.loss { color: var(--red); }
.fb-corner { position: absolute; }
.fb-tl { top: 6%;  left: 9%; }   .fb-tr { top: 6%;  right: 9%; }
.fb-bl { bottom: 6%; left: 9%; } .fb-br { bottom: 6%; right: 9%; }
.fb-food { width: 150px; height: 150px; object-fit: cover; border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5); display: block; }
.fb-sad  { font-size: 90px; line-height: 1; }
.img-placeholder { display: flex; align-items: center; justify-content: center;
  background: var(--bg2); border: 1px dashed var(--fg-dim); color: var(--fg-dim);
  font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

/* ── Bonus round (mini-MID) ── */
.bonus-stage { display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 440px; text-align: center; }
.bonus-intro { font-size: 40px; font-weight: bold; color: var(--gold); }
.bonus-cue { max-width: 50vw; max-height: 50vh; width: auto; height: auto;
  object-fit: contain; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.bonus-cue.img-placeholder { width: 50vw; height: 36vh; }
.bonus-fix    { font-size: 72px; font-weight: bold; color: var(--fg); }
.bonus-square { width: 150px; height: 150px; background: var(--fg); border-radius: 6px; }
.bonus-fb     { font-size: 44px; font-weight: bold; }
.bonus-fb.win  { color: var(--green); }
.bonus-fb.warn { color: var(--gold); }
.bonus-fb-pts { font-size: 34px; font-weight: bold; color: var(--green); margin-top: 12px; }
.bonus-fb-sub { font-size: 20px; color: var(--fg-dim); margin-top: 10px; }

/* ── Photodiode sync square (only shown when CFG.PHOTODIODE) ── */
#photodiode { position: fixed; top: 0; left: 0; width: 60px; height: 60px;
  background: #000; z-index: 100000; display: none; }
#photodiode.on { display: block; }
</style>
</head>
<body>

<div id="bandit-header">
  <span id="hdr-trial">Trial 1 / 200</span>
  <span id="hdr-score">Score: 0 pts</span>
</div>
<div id="progress-wrap"><div id="progress-fill"></div></div>

<!-- Photodiode sync square (hidden unless CFG.PHOTODIODE is true). For iEEG /
     direct-recording sessions, a light sensor over this square captures true
     event-onset times for cue, target, and feedback. -->
<div id="photodiode"></div>

<!-- jsPsych renders into this dedicated target so it never wipes the
     persistent header / progress bar / nudge overlay above & below. -->
<div id="jspsych-target"></div>

<!-- Inactivity nudge overlay -->
<div id="inactivity-nudge">
  <div class="nudge-box">
    <div class="nudge-title">Are you still there?</div>
    <div class="nudge-body">
      You haven't made a choice in a while.<br>
      Please continue playing — click anywhere on the screen to resume.
    </div>
    <button class="nudge-btn" id="nudge-dismiss">I'm still here</button>
    <div class="nudge-timer" id="nudge-countdown">Task will end in 45s</div>
  </div>
</div>

<script>
// ── Fail loudly if the CDN scripts didn't load (instead of a blank page) ──
if (typeof initJsPsych === 'undefined' ||
    typeof jsPsychHtmlKeyboardResponse === 'undefined' ||
    typeof jsPsychSurveyText === 'undefined') {
  document.body.innerHTML =
    '<div style="max-width:560px;margin:120px auto;font-family:sans-serif;' +
    'color:#e0e0e0;text-align:center;line-height:1.6">' +
    '<h2 style="color:#E8845C">Could not load the task</h2>' +
    '<p>The jsPsych library failed to load from the internet. Please check your ' +
    'connection and refresh the page. If the problem persists, contact the researcher.</p>' +
    '</div>';
  throw new Error('jsPsych failed to load from CDN');
}
// ═══════════════════════════════════════════════════════════════
//  Probabilistic Bandit Task v10
//  3-arm probabilistic reversal-learning task (reversals throughout)
//  Three profiles, one per arm:
//    reward-arm:  75% reward (+10), 25% loss (-10)
//    arm 1 profile: 70% reward (+10), 30% loss (-10)   (EV +4)
//    arm 2 profile: 30% reward (+10), 70% loss (-10)   (EV -4)
//    arm 3 profile: 50% reward (+10), 50% loss (-10)   (EV  0, pure chance)
//  Outcomes are binary: reward (+10) or loss (-10). No neutral outcome.
//  PER-PARTICIPANT RANDOM SCHEDULE: each session draws its OWN outcome sequence,
//    reversal direction, and symbol placement from a random per-session seed
//    (logged in every row for reproducibility). So the reward schedule and the
//    left→right symbol positions differ between participants.
//  FIXED REVERSAL TRIAL: the single reversal always occurs at the same trial
//    (CFG.REVERSAL_TRIAL) for every participant.
//  Three logos (heart, circle, triangle) are placed at three screen positions
//    (1=left, 2=middle, 3=right). Placement is randomized per participant.
//  POSITION-CENTRIC OUTPUT: each row logs the logo at each position
//    (position1-3), the reward probability at each position (p_reward_pos1-3),
//    the position chosen (choice) and the logo there (chosen_logo), the optimal
//    position, points, regret, and per-position counterfactuals.
//  The reversal cyclically rotates the three reward profiles in a random
//    direction, so which position is best flips (the 50/50 profile moves too).
// ═══════════════════════════════════════════════════════════════
const CFG = {
  N_ARMS:          3,
  N_TRIALS:        200,
  REWARD_PTS:      10,
  LOSS_PTS:        -10,
  // Arm probability profiles [p_reward, p_loss]
  PROFILE_A:       [0.70, 0.30],  // best   (EV +4)
  PROFILE_B:       [0.30, 0.70],  // worst  (EV -4)
  PROFILE_C:       [0.50, 0.50],  // chance (EV  0)
  // Single reversal at a FIXED trial (1-indexed data trial), same for everyone
  REVERSAL_TRIAL:  112,
  // Timing (ms)
  FEEDBACK_MS:     900,    // bandit feedback (points + corner pics / sad emojis)
  ITI_MS:          500,
  ANIM_MS:         400,
  CHOICE_DEADLINE_MS: 4000, // no choice by 4 s -> "Please answer faster." prompt; trial still waits for a click

  // ── Mini-MID "bonus round" config ──────────────────────────
  // 16 food-cue + 14 neutral-cue speeded-detection trials, interleaved through the
  // bandit. The food cue is drawn from the participant's assigned win set (sweet OR
  // savory); the neutral cue from the "neutral cues" folder. Target RT is the
  // incentive-vigor measure. Bonus points are kept on a SEPARATE tally from the
  // bandit score so they do not perturb the bandit's running reward rate.
  N_BONUS_FOOD:    16,
  N_BONUS_NEUTRAL: 14,
  BONUS_INTRO_MS:  1000,   // "Bonus round!" screen
  CUE_MS:          1500,   // cue image (food/neutral), centered, ~half screen
  DELAY_MIN_MS:    1500,   // anticipatory fixation jitter, lower bound
  DELAY_MAX_MS:    3500,   // anticipatory fixation jitter, upper bound
  GRACE_MS:        500,    // post-window listening: a late press is logged as miss-with-RT, not no_response
  BONUS_FEEDBACK_MS: 1500, // "Congrats! +10" / "respond faster" / "too soon"
  BONUS_PTS:       10,
  // Adaptive response-window staircase. Weighted up/down converging on ~66% hits:
  // a hit shortens the window (step_down), a miss lengthens it (step_up). The ratio
  // step_down/step_up = (1-0.66)/0.66 ~= 0.5 sets the target hit rate. The window is
  // only the success criterion; target_rt_ms is recorded regardless and is unaffected.
  // (To revert to a fixed sampled window instead of a staircase, set WIN_STEP_* to 0
  //  and draw adaptive_window_ms from a fixed range in makeBonusTrial.)
  WIN_START:       400,
  WIN_FLOOR:       250,    // kept >= a legitimate simple RT so trials are not unwinnable
  WIN_CEIL:        500,
  WIN_STEP_DOWN:   15,     // shorten after a hit
  WIN_STEP_UP:     30,     // lengthen after a miss / no-response
  // Bonus placement across the bandit stream
  BONUS_FIRST_AFTER: 8,    // earliest bandit trial a bonus may follow
  BONUS_REV_BUFFER:  3,    // keep bonuses at least this many trials from the reversal
  BONUS_MIN_GAP:     3,    // minimum bandit trials between two bonuses

  // Photodiode sync square: ON for direct-recording (iEEG) sessions, OFF for behavioral-only.
  PHOTODIODE:      false,
};

// ── Food / neutral image sets ────────────────────────────────
// FILL THESE IN with your image filenames. Paths are built as <dir><filename> and
// URL-encoded (so the space in "neutral cues" is handled). Each session is randomly
// assigned the sweet OR savory win set (logged as food_set); that set is used for
// BOTH the bandit win feedback and the food bonus cues. If an array is left empty the
// code shows a labeled placeholder so the task still runs for testing.
const IMG = {
  win_sweet_dir:  'win/sweet/',
  win_savory_dir: 'win/savory/',
  neutral_dir:    'neutral cues/',     // folder literally named "neutral cues"
  win_sweet:      [],   // e.g. ['cookie.jpg','cake.jpg','donut.jpg', ...]
  win_savory:     [],   // e.g. ['fries.jpg','pizza.jpg','burger.jpg', ...]
  neutral:        [],   // e.g. ['stapler.jpg','mug.jpg','chair.jpg', ...]
};
const SAD_EMOJI = '\u{1F622}';   // 😢

const ARM_LABELS = ["A", "B", "C"];
const ARM_HEX    = ["#274c86", "#9c4620", "#256b50"];  // dark blue / rust / green (for symbols on light box)
const OUTCOMES   = { reward: 10, loss: -10 };

// ── Google Drive saving (required) ───────────────────────────
// Deploy the included Apps Script (save_to_drive.gs) as a Web App and paste
// its URL here. Each participant's CSV is sent ONLY to your Drive folder — there
// is no local download. If this is left as '', the data has nowhere to go, so
// set it before collecting data.
const DRIVE_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwxm8VUHSeF_Fe4XwRODRxVROo6Bz-Tj6vXeiN5Rnuw6HshO_Wo6zVAomcMQWnVjNEQ5g/exec';
// Shared secret sent with every save. It MUST exactly match SECRET in
// save_to_drive.gs; the script rejects any POST without it, so a stranger who
// finds the public endpoint URL cannot inject data. (Note: this value is
// visible in the page source, so it deters drive-by abuse rather than being
// truly secret. Change it to your own random string and keep both files in sync.)
const DRIVE_SECRET = 'R4nAkqQm2xDI9gAewTatgQ==';

// ── RNG (random per session → schedule & placement differ per participant) ──
// A fresh random seed is drawn each session and LOGGED in every data row, so the
// outcome sequence, reversal direction, and symbol placement vary between
// participants but remain reproducible from the logged seed. (The reversal TRIAL
// is fixed in CFG, independent of this seed.) mulberry32 is integer-based and
// reproducible across browsers.
const SEED = (Math.random() * 0x100000000) >>> 0;   // random uint32, logged per row
function makeRNG(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const _rng = makeRNG(SEED);
function rand() { return _rng(); }

function randInt(lo, hi) {
  return Math.floor(rand() * (hi - lo + 1)) + lo;
}

// Sample outcome from a probability profile [p_reward, p_loss]
function sampleOutcome(profile) {
  return (rand() < profile[0]) ? 'reward' : 'loss';
}

// ── Reversal schedule ─────────────────────────────────────────
// One reversal at a FIXED trial for every participant. CFG.REVERSAL_TRIAL is the
// 1-indexed data trial at which the reversal takes effect; the internal schedule
// is 0-indexed, so we subtract 1.
function generateSwapSchedule() {
  return [CFG.REVERSAL_TRIAL - 1];
}

// ── Task state ───────────────────────────────────────────────
const SWAP_SCHEDULE = generateSwapSchedule();

const S = {
  pid:        "",
  trial:      0,          // 0-indexed global trial
  score:      0,
  data:       [],
  taskStart:  null,
  // Current arm profiles [p_reward, p_loss]. All three rotate at the reversal.
  profiles: [
    [...CFG.PROFILE_A],   // arm 0 (best at start)
    [...CFG.PROFILE_B],   // arm 1 (worst at start)
    [...CFG.PROFILE_C],   // arm 2 (chance at start)
  ],
  // Track reversals
  swapCount:  0,
  // Randomly chosen Celtic symbols assigned to the 3 arm positions (set lazily)
  symbols:    null,
  symbolMap:  null,   // per-participant random map: logical arm → symbol index
  slotOrder:  null,   // per-participant random map: screen slot → logical arm
  // Session flags
  started:        false,  // set true once the first choice screen loads
  driveSaved:     false,  // ensures we POST to Drive only once
  exportFilename: null,   // stable filename across re-downloads
};

// Apply the single reversal if it is scheduled at the start of this trial.
// It cyclically rotates ALL THREE arm profiles in a random direction. A 3-cycle
// is the only permutation of 3 items with no fixed point, so every arm changes
// role — including the 50/50 (chance) arm — and which arm becomes best is
// unpredictable.
function applySwapsIfNeeded() {
  if (SWAP_SCHEDULE.includes(S.trial)) {
    const p = S.profiles;
    S.profiles = (rand() < 0.5)
      ? [p[2], p[0], p[1]]   // rotate right
      : [p[1], p[2], p[0]];  // rotate left
    S.swapCount++;
  }
}

// Which arm (1-3) currently holds the 50/50 (chance, EV-0) profile.
function chanceArm() {
  let bestDist = Infinity, idx = 0;
  S.profiles.forEach((p, i) => {
    const d = Math.abs(p[0] - 0.5);
    if (d < bestDist) { bestDist = d; idx = i; }
  });
  return idx + 1;
}

// ── Header ───────────────────────────────────────────────────
function showHeader() {
  document.getElementById('bandit-header').classList.add('visible');
  document.getElementById('progress-wrap').classList.add('visible');
}
function updateHeader() {
  const t     = S.trial + 1;
  document.getElementById('hdr-trial').textContent  = `Trial ${t} / ${CFG.N_TRIALS}`;
  document.getElementById('hdr-score').textContent  = `Score: ${S.score} pts`;
  document.getElementById('progress-fill').style.width =
    `${(S.trial / CFG.N_TRIALS * 100).toFixed(1)}%`;
}

// ── Register choice ──────────────────────────────────────────
function registerChoice(arm, rt_ms, late = false) {
  if (S.trial === 0) S.taskStart = performance.now();

  // Apply swaps before sampling (swap happens at start of trial)
  applySwapsIfNeeded();

  const rt_s   = parseFloat((rt_ms / 1000).toFixed(4));

  // Predetermined per-logo outcomes this trial (one draw per logo in a fixed
  // order, so the per-session seed reproduces the sequence). The chosen logo's
  // realized outcome IS its counterfactual; the others equal what they'd give.
  const cf_outcomes = S.profiles.map(p => sampleOutcome(p));
  const cf_points   = cf_outcomes.map(o => OUTCOMES[o]);
  const outcome     = cf_outcomes[arm];
  const points      = cf_points[arm];
  S.score          += points;

  // Screen POSITIONS (1 = left .. 3 = right). slotOrder[p-1] is the logo (logical
  // index) shown at position p this session. Output is logged in POSITION terms.
  const L            = p => S.slotOrder[p - 1];           // logical arm at position p
  const sym          = a => SYMBOLS[S.symbolMap[a]].name; // logo assigned to logical arm a
  const choicePos    = S.slotOrder.indexOf(arm) + 1;      // position the participant clicked
  const p_rewards    = S.profiles.map(pr => pr[0]);
  const optArm       = p_rewards.indexOf(Math.max(...p_rewards));   // best logo (0-idx)
  const optimalPos   = S.slotOrder.indexOf(optArm) + 1;            // best position this trial
  const is_optimal   = choicePos === optimalPos ? 1 : 0;
  const optimal_points = cf_points[optArm];
  const regret         = optimal_points - points;
  const prob           = p => parseFloat(S.profiles[L(p)][0].toFixed(4));

  S.data.push({
    participant_id:    S.pid,
    trial_type:        'bandit',                    // distinguishes core RL rows from interleaved bonus rows
    trial:             S.trial + 1,
    swap_count:        S.swapCount,                 // 0 before the reversal, 1 after
    // Which logo sits at each screen position (left→right); constant within a session
    position1:         sym(L(1)),
    position2:         sym(L(2)),
    position3:         sym(L(3)),
    // Reward probability at each position this trial (reverses at the reversal trial)
    p_reward_pos1:     prob(1),
    p_reward_pos2:     prob(2),
    p_reward_pos3:     prob(3),
    // Response
    choice:            choicePos,                   // position chosen (1 = left .. 3 = right)
    chosen_logo:       sym(arm),                    // logo at the chosen position
    rt_s,
    choice_late:       late ? 1 : 0,               // 1 if responded after the 4 s "Please answer faster." prompt
    outcome,                                        // reward / loss
    points,                                         // +10 / -10
    optimal_position:  optimalPos,                  // position with the highest reward prob now
    is_optimal,                                     // 1 if choice == optimal_position
    optimal_points,                                 // points the best position gave this trial
    regret,                                         // optimal_points - points
    cumulative_score:  S.score,
    seed:              SEED,                         // per-session seed (reproduces schedule + placement)
    // Counterfactual: what each position would have given this trial
    cf_outcome_pos1:   cf_outcomes[L(1)],
    cf_outcome_pos2:   cf_outcomes[L(2)],
    cf_outcome_pos3:   cf_outcomes[L(3)],
    cf_points_pos1:    cf_points[L(1)],
    cf_points_pos2:    cf_points[L(2)],
    cf_points_pos3:    cf_points[L(3)],
  });

  S.trial++;
  // Update score + progress now so the feedback screen reflects this trial.
  // The trial NUMBER advances when the next choice screen loads (see choice.on_load),
  // which keeps the counter on the current trial and prevents it overshooting to 201.
  document.getElementById('hdr-score').textContent  = `Score: ${S.score} pts`;
  document.getElementById('progress-fill').style.width =
    `${(S.trial / CFG.N_TRIALS * 100).toFixed(1)}%`;
  return { points, outcome };
}


// ── CSV export ────────────────────────────────────────────────
// Build a stable filename once, so re-downloads and the Drive copy match.
function exportFilename() {
  if (S.exportFilename) return S.exportFilename;
  const etStr  = new Date().toLocaleString('en-US', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  const [datePart, timePart] = etStr.split(', ');
  const [m, d, y] = datePart.split('/');
  const ts      = `${y}${m}${d}_${timePart.replace(/:/g,'')}`;
  const safePid = (S.pid || 'NA').trim().replace(/[^a-zA-Z0-9_-]/g, '_');
  S.exportFilename = `prob_bandit_${safePid}_${ts}.csv`;
  return S.exportFilename;
}

function buildCSV() {
  if (!S.data.length) return null;
  const taskDur = S.taskStart
    ? parseFloat(((performance.now() - S.taskStart) / 1000).toFixed(2))
    : null;
  // Bandit rows and bonus rows carry different columns, so build the UNION of keys
  // across all rows in first-seen order; missing cells are written blank.
  const keys = [];
  const seen = new Set();
  S.data.forEach(r => Object.keys(r).forEach(k => {
    if (!seen.has(k)) { seen.add(k); keys.push(k); }
  }));
  const allKeys = [...keys, 'task_duration_s'];
  // CSV-escape: quote any value containing a comma, quote, or newline (e.g. a comma
  // keypress in target_response_key, or a path with spaces).
  const esc = (v) => {
    if (v === undefined || v === null) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [allKeys.join(','),
    ...S.data.map(r => [
      ...keys.map(k => esc(r[k])),
      taskDur !== null ? taskDur : '',
    ].join(','))
  ];
  return { filename: exportFilename(), csv: lines.join('\n') };
}

// Fire-and-forget POST to the Apps Script Web App. no-cors avoids a CORS
// preflight; we can't read the response. Data is saved to Drive only.
function saveToDrive(filename, csv) {
  if (!DRIVE_ENDPOINT) return;
  try {
    fetch(DRIVE_ENDPOINT, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify({ filename, csv, participant_id: S.pid, secret: DRIVE_SECRET })
    }).catch(() => {});
  } catch (e) { /* ignore */ }
}

function exportCSV() {
  const out = buildCSV();
  if (!out) return;
  _completed = true;     // a full/quit save is running → suppress partial beacons
  // Drive-only: send to the Apps Script endpoint. The participant never gets a
  // local CSV download. (DRIVE_ENDPOINT must be set for data to be saved.)
  if (!S.driveSaved) { saveToDrive(out.filename, out.csv); S.driveSaved = true; }
}

// ── Partial save if the participant leaves mid-task ───────────
// Best-effort: when the page is hidden/unloaded before completion, fire a
// navigator.sendBeacon() POST of whatever has been collected so far to the same
// Drive endpoint, with a "_partial" filename so it's distinguishable. De-duped
// by row count so repeated tab-switches don't spam identical files, and never
// runs once a full/quit/timeout save has happened.
// Limitations: sendBeacon is best-effort and not guaranteed (some mobile
// browsers, hard crashes, power loss); and because the POST is no-cors the page
// can't confirm receipt. It is a safety net, not a guarantee.
let _completed  = false;
let _beaconRows = 0;
function saveBeacon() {
  if (_completed || !S.data.length || S.data.length <= _beaconRows) return;
  if (!DRIVE_ENDPOINT || !(navigator && navigator.sendBeacon)) return;
  const out      = buildCSV();
  if (!out) return;
  const partname = out.filename.replace(/\.csv$/, '_partial.csv');
  try {
    const blob = new Blob(
      [JSON.stringify({ filename: partname, csv: out.csv, participant_id: S.pid, secret: DRIVE_SECRET })],
      { type: 'text/plain;charset=utf-8' });
    if (navigator.sendBeacon(DRIVE_ENDPOINT, blob)) _beaconRows = S.data.length;
  } catch (e) { /* best-effort only */ }
}
window.addEventListener('pagehide', saveBeacon);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveBeacon();
});

function symbolHTML(armIdx) {
  // armIdx is a LOGICAL arm; S.symbolMap[armIdx] is the symbol assigned to it
  // this session (random per participant). Falls back to identity if unset.
  const s = S.symbolMap ? S.symbolMap[armIdx] : armIdx;
  return `<div class="slot-body celtic"><img class="celtic-symbol" src="${SYMBOLS[s].uri}" alt=""></div>`;
}

// Per-participant random screen layout. Returns a permutation of [0,1,2] where
// slotOrder[s] is the LOGICAL arm shown at screen slot s (left→right). Drawn from
// the per-session seed, so placement varies per participant and is reproducible.
function shufflePositions() {
  const a = [0, 1, 2];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Build symbol grid ─────────────────────────────────────────
// Screen slots are laid out left→right; slot s shows LOGICAL arm S.slotOrder[s].
// slotOrder is randomized per session, so symbol placement varies per participant.
// data-arm carries the LOGICAL index, so clicks and scoring stay in schedule terms.
function buildSlotGrid(disabled=false, chosenArm=-1, points=null, outcome=null) {
  if (!S.symbolMap) S.symbolMap = shufflePositions();   // logical arm → symbol  (random per session)
  if (!S.slotOrder) S.slotOrder = shufflePositions();   // screen position → arm (random per session)
  return `
    <div class="slot-grid">
      ${S.slotOrder.map((L) => {
        const isChosen = L === chosenArm;
        const dimmed   = disabled && !isChosen;
        let reward = `<div class="slot-reward hidden">–</div>`;
        if (isChosen && points !== null) {
          const cls = outcome === 'reward' ? 'win' : 'loss';
          const sign = points > 0 ? '+' : '';
          reward = `<div class="slot-reward ${cls}">${sign}${points} pts</div>`;
        }
        return `
          <div class="slot-machine${disabled?' disabled':''}${dimmed?' dimmed':''}"
               data-arm="${L}"
               style="opacity:${dimmed?'0.35':'1'}">
            ${symbolHTML(L)}
            ${reward}
          </div>`;
      }).join('')}
    </div>`;
}

// ── Inactivity timer ─────────────────────────────────────────
const INACTIVITY = {
  NUDGE_MS:     15000,
  HARD_STOP_MS: 45000,
  _nudgeTimer:  null,
  _stopTimer:   null,
  _countInterval: null,
};

function inactivityClear() {
  clearTimeout(INACTIVITY._nudgeTimer);
  clearTimeout(INACTIVITY._stopTimer);
  clearInterval(INACTIVITY._countInterval);
  INACTIVITY._nudgeTimer = INACTIVITY._stopTimer = INACTIVITY._countInterval = null;
  const nudge = document.getElementById('inactivity-nudge');
  if (nudge) nudge.classList.remove('visible');
}

function inactivityHardStop() {
  inactivityClear();
  if (S.data.length === 0) return;
  exportCSV();
  jsPsych.endExperiment();
  const display = document.querySelector('.jspsych-display-element') || document.body;
  display.innerHTML = `
    <div class="end-wrap" style="padding-top:100px">
      <div class="end-title" style="color:var(--red)">Task Ended — Inactivity</div>
      <div class="end-score">Score so far: ${S.score} pts</div>
      <div class="end-stat">Trials completed: ${S.trial} / ${CFG.N_TRIALS}</div>
      <div class="end-note">Your responses have been submitted.</div>
    </div>`;
}

function inactivityShowNudge() {
  const nudge = document.getElementById('inactivity-nudge');
  if (!nudge) return;
  nudge.classList.add('visible');
  let remaining = INACTIVITY.HARD_STOP_MS / 1000;
  const countEl = document.getElementById('nudge-countdown');
  if (countEl) countEl.textContent = `Task will end in ${remaining}s`;
  INACTIVITY._countInterval = setInterval(() => {
    remaining--;
    const el = document.getElementById('nudge-countdown');
    if (el) {
      el.textContent = `Task will end in ${remaining}s`;
      if (remaining <= 10) el.classList.add('urgent');
    }
    if (remaining <= 0) clearInterval(INACTIVITY._countInterval);
  }, 1000);
  INACTIVITY._stopTimer = setTimeout(inactivityHardStop, INACTIVITY.HARD_STOP_MS);
  const btn = document.getElementById('nudge-dismiss');
  if (btn) btn.onclick = () => { inactivityClear(); inactivityStart(); };
}

function inactivityStart() {
  inactivityClear();
  INACTIVITY._nudgeTimer = setTimeout(inactivityShowNudge, INACTIVITY.NUDGE_MS);
}

// ═══════════════════════════════════════════════════════════════
//  Stimulus RNG + image helpers  (kept SEPARATE from the outcome RNG)
// ═══════════════════════════════════════════════════════════════
// rand() drives the reproducible reward schedule and its call ORDER must not change.
// All stimulus / cosmetic randomness (food-set assignment, which pictures are drawn,
// corner tilt, bonus placement) uses srand(), a second seed-derived stream, so adding
// stimuli never shifts the bandit schedule for a given seed.
const _srng = makeRNG((SEED ^ 0x9E3779B9) >>> 0);
function srand() { return _srng(); }
function srandInt(lo, hi) { return Math.floor(srand() * (hi - lo + 1)) + lo; }

// This session's win-food set (sweet vs savory), assigned once, reproducibly.
function foodSet() {
  if (!S.foodSet) S.foodSet = (srand() < 0.5) ? 'sweet' : 'savory';
  return S.foodSet;
}
function winSet() { return foodSet() === 'sweet' ? IMG.win_sweet     : IMG.win_savory; }
function winDir() { return foodSet() === 'sweet' ? IMG.win_sweet_dir : IMG.win_savory_dir; }

// Draw n image PATHS from a (files, dir) set using srand(): without replacement when
// possible, else with replacement. Returns [] if the set is empty.
function drawImages(files, dir, n) {
  if (!files || files.length === 0) return [];
  const pool = files.slice(), out = [];
  for (let i = 0; i < n; i++) {
    if (pool.length === 0) pool.push(...files);
    const idx = Math.floor(srand() * pool.length);
    out.push(encodeURI(dir + pool.splice(idx, 1)[0]));
  }
  return out;
}
function drawImage(files, dir) { const a = drawImages(files, dir, 1); return a.length ? a[0] : null; }

// <img> tag, or a labeled placeholder box if no real image is configured (test mode).
function imgOrPlaceholder(path, cls, label) {
  return path
    ? `<img class="${cls}" src="${path}" alt="">`
    : `<div class="${cls} img-placeholder">${label || 'image'}</div>`;
}

// Preload every configured image so cues / feedback do not flash in mid-trial.
(function preloadImages() {
  [...IMG.win_sweet.map(f => IMG.win_sweet_dir + f),
   ...IMG.win_savory.map(f => IMG.win_savory_dir + f),
   ...IMG.neutral.map(f => IMG.neutral_dir + f)]
    .forEach(p => { const im = new Image(); im.src = encodeURI(p); });
})();

// Show the photodiode square only on direct-recording sessions.
if (CFG.PHOTODIODE) { const _pd = document.getElementById('photodiode'); if (_pd) _pd.classList.add('on'); }
// Flash the photodiode white at an event onset (no-op unless CFG.PHOTODIODE).
function pdFlash() {
  if (!CFG.PHOTODIODE) return;
  const el = document.getElementById('photodiode');
  if (!el) return;
  el.style.background = '#fff';
  setTimeout(() => { el.style.background = '#000'; }, 100);
}

// ═══════════════════════════════════════════════════════════════
//  Bandit feedback screen (points centered, four tilted corner items)
// ═══════════════════════════════════════════════════════════════
// Win: "+10 Points" (green) ringed by four food pictures from the assigned win set,
// one per corner, each tilted a different small angle. Loss: "-10 Points" (red) with a
// sad emoji in each corner. Cosmetic randomness uses srand() (schedule-safe).
function buildBanditFeedback(points, outcome) {
  const isWin = outcome === 'reward';
  const sign  = points > 0 ? '+' : '';
  const cls   = isWin ? 'win' : 'loss';
  const corners = ['fb-tl', 'fb-tr', 'fb-bl', 'fb-br'];
  const pics  = isWin ? drawImages(winSet(), winDir(), 4) : [];
  const items = corners.map((pos, i) => {
    const tilt  = srandInt(-13, 13);
    const inner = isWin
      ? imgOrPlaceholder(pics[i] || null, 'fb-food', foodSet())
      : `<div class="fb-sad">${SAD_EMOJI}</div>`;
    return `<div class="fb-corner ${pos}" style="transform:rotate(${tilt}deg)">${inner}</div>`;
  }).join('');
  return `<div class="fb-wrap">${items}<div class="fb-center ${cls}">${sign}${points} Points</div></div>`;
}

// ═══════════════════════════════════════════════════════════════
//  Mini-MID "bonus round" trial  (one self-managed jsPsych trial)
// ═══════════════════════════════════════════════════════════════
// Sequence (driven by timeouts inside a single trial): "Bonus round!" -> cue
// (food or neutral) -> jittered fixation (anticipatory delay) -> empty square
// (adaptive response window) -> optional grace window -> feedback. A keypress is
// classified by WHEN it lands: before the square = too_fast; within the window = hit
// (+bonus); within the grace = late miss (RT still logged); none = no_response.
// target_rt_ms is the latency from square onset and is the incentive-vigor measure.
function makeBonusTrial(isFood) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    choices: "NO_KEYS",                       // keys handled manually below
    stimulus: `<div class="bonus-stage"><div class="bonus-intro">Bonus round!</div></div>`,
    on_load: () => {
      S.inBonus    = true;                    // suspend q/Esc quit so "any key" can't quit the task
      S.bonusCount = (S.bonusCount || 0) + 1;
      if (S.bonusWindow == null) S.bonusWindow = CFG.WIN_START;

      const stage    = document.querySelector('.bonus-stage');
      const cueType  = isFood ? `food_${foodSet()}` : 'neutral';
      const cuePath  = isFood ? drawImage(winSet(), winDir())
                              : drawImage(IMG.neutral, IMG.neutral_dir);
      const delayMs  = srandInt(CFG.DELAY_MIN_MS, CFG.DELAY_MAX_MS);
      const windowMs = Math.round(S.bonusWindow);
      const t0       = performance.now();     // all *_onset_ms below are ms since t0

      let phase = 'intro';                    // intro -> cue -> delay -> target -> grace -> done
      let responded = false;
      let pressKey = '', rtMs = '', premRt = '';
      let cueOnset = '', delayOnset = '', targetOnset = '', respTime = '', fbOnset = '';
      const timers = [];
      const T = (fn, ms) => { const id = setTimeout(fn, ms); timers.push(id); return id; };

      const onKey = (e) => {
        if (responded || phase === 'intro' || phase === 'done') return;
        responded = true;
        pressKey = e.key;
        const now = performance.now();
        if (phase === 'cue' || phase === 'delay') {        // before the square -> premature
          premRt = Math.round(now - (t0 + cueOnset));
          finish('too_fast');
        } else if (phase === 'target') {                   // within the window -> hit
          respTime = Math.round(now - t0);
          rtMs     = Math.round(now - (t0 + targetOnset));
          finish('hit');
        } else if (phase === 'grace') {                    // after window, before feedback -> late miss
          respTime = Math.round(now - t0);
          rtMs     = Math.round(now - (t0 + targetOnset)); // still measured from square onset
          finish('miss');
        }
      };
      document.addEventListener('keydown', onKey, true);

      // Resolve outcome -> update staircase -> log row -> show feedback -> end trial.
      function finish(outcome) {
        if (phase === 'done') return;
        phase = 'done';
        timers.forEach(clearTimeout);
        document.removeEventListener('keydown', onKey, true);

        const hit = outcome === 'hit';
        if (hit)                         S.bonusWindow = Math.max(CFG.WIN_FLOOR, S.bonusWindow - CFG.WIN_STEP_DOWN);
        else if (outcome !== 'too_fast') S.bonusWindow = Math.min(CFG.WIN_CEIL,  S.bonusWindow + CFG.WIN_STEP_UP);

        const pts = hit ? CFG.BONUS_PTS : 0;
        S.bonusScore = (S.bonusScore || 0) + pts;
        S.bonusHits  = (S.bonusHits  || 0) + (hit ? 1 : 0);

        S.data.push({
          participant_id:            S.pid,
          trial_type:                isFood ? 'bonus_food' : 'bonus_neutral',
          bonus_trial_index:         S.bonusCount,
          position_in_bandit_stream: S.trial,     // # bandit trials completed before this bonus
          food_set:                  foodSet(),
          cue_type:                  cueType,
          food_bonus_cue:            isFood ? 1 : 0,
          cue_image:                 cuePath || '',
          cue_duration_ms:           CFG.CUE_MS,
          anticipatory_delay_ms:     delayMs,
          adaptive_window_ms:        windowMs,
          target_response_key:       pressKey,
          target_rt_ms:              rtMs,
          premature_rt_ms:           premRt,
          target_hit:                hit ? 1 : 0,
          target_miss:               outcome === 'miss' ? 1 : 0,
          target_too_fast:           outcome === 'too_fast' ? 1 : 0,
          target_no_response:        outcome === 'no_response' ? 1 : 0,
          bonus_points_earned:       pts,
          bonus_cumulative:          S.bonusScore,
          bonus_hit_rate:            parseFloat((S.bonusHits / S.bonusCount).toFixed(3)),
          cue_onset_ms:              cueOnset,
          delay_onset_ms:            delayOnset,
          target_onset_ms:           targetOnset,
          response_ms:               respTime,
          feedback_onset_ms:         '',          // filled just below
          seed:                      SEED,
        });
        const row = S.data[S.data.length - 1];

        fbOnset = Math.round(performance.now() - t0);
        row.feedback_onset_ms = fbOnset;
        let msg;
        if (hit) msg = `<div class="bonus-fb win">Congrats!</div><div class="bonus-fb-pts">+${CFG.BONUS_PTS} points</div>`;
        else if (outcome === 'too_fast') msg = `<div class="bonus-fb warn">Too soon!</div><div class="bonus-fb-sub">Wait for the square.</div>`;
        else msg = `<div class="bonus-fb warn">Next time respond faster.</div>`;
        if (stage) stage.innerHTML = msg;
        pdFlash();
        T(() => { S.inBonus = false; jsPsych.finishTrial(); }, CFG.BONUS_FEEDBACK_MS);
      }

      // Run the sequence.
      T(() => {                                              // cue
        phase = 'cue'; cueOnset = Math.round(performance.now() - t0);
        if (stage) stage.innerHTML = imgOrPlaceholder(cuePath, 'bonus-cue', isFood ? foodSet() : 'neutral');
        pdFlash();
        T(() => {                                            // anticipatory fixation
          phase = 'delay'; delayOnset = Math.round(performance.now() - t0);
          if (stage) stage.innerHTML = `<div class="bonus-fix">+</div>`;
          T(() => {                                          // target square
            phase = 'target'; targetOnset = Math.round(performance.now() - t0);
            if (stage) stage.innerHTML = `<div class="bonus-square"></div>`;
            pdFlash();
            T(() => {                                        // window elapsed, no hit -> grace
              if (responded || phase === 'done') return;
              phase = 'grace';
              if (stage) stage.innerHTML = `<div class="bonus-fix" style="visibility:hidden">+</div>`;
              T(() => {                                      // grace elapsed -> no response
                if (responded || phase === 'done') return;
                finish('no_response');
              }, CFG.GRACE_MS);
            }, windowMs);
          }, delayMs);
        }, CFG.CUE_MS);
      }, CFG.BONUS_INTRO_MS);
    },
    on_finish: () => { S.inBonus = false; },
  };
}

// Build the bonus deck (16 food + 14 neutral) in a schedule-safe random order.
function buildBonusDeck() {
  const deck = [];
  for (let i = 0; i < CFG.N_BONUS_FOOD; i++)    deck.push(true);
  for (let i = 0; i < CFG.N_BONUS_NEUTRAL; i++) deck.push(false);
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(srand() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

// Bandit-trial indices to insert bonuses after: spread across bins, buffered around
// the reversal, no two within BONUS_MIN_GAP. Returns a sorted array.
function buildBonusPositions(nBonus) {
  const lo = CFG.BONUS_FIRST_AFTER, hi = CFG.N_TRIALS - 1, rev = CFG.REVERSAL_TRIAL;
  const used = [];
  const tooClose = (p) =>
    Math.abs(p - rev) < CFG.BONUS_REV_BUFFER ||
    used.some(u => Math.abs(u - p) < CFG.BONUS_MIN_GAP);
  const binW = (hi - lo) / nBonus;
  for (let i = 0; i < nBonus; i++) {
    const a = Math.floor(lo + i * binW), b = Math.floor(lo + (i + 1) * binW);
    let p, tries = 0;
    do { p = srandInt(a, Math.max(a, b - 1)); tries++; } while (tooClose(p) && tries < 40);
    used.push(p);
  }
  return used.sort((x, y) => x - y);
}

// ═══════════════════════════════════════════════════════════════
//  jsPsych timeline
// ═══════════════════════════════════════════════════════════════
const jsPsych = initJsPsych({ display_element: 'jspsych-target', on_finish: () => {} });

// ── 1. PID ────────────────────────────────────────────────────
const pid_trial = {
  type: jsPsychSurveyText,
  preamble: `
    <div class="bandit-title">Probabilistic Bandit Task</div>
    <div class="bandit-subtitle">Reward-learning task</div>`,
  questions: [{ prompt: 'Participant ID', name: 'pid', required: true, columns: 20 }],
  button_label: 'Continue →',
  on_finish: (data) => { S.pid = data.response.pid.trim(); }
};

// ── 2. Instructions ───────────────────────────────────────────
const instructions_trial = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instr-title">Instructions</div>
    <div class="instr-body">
      In this task you'll see three symbols. Choose one by clicking it with the
      mouse. This is a hard task so go with your gut without overthinking it.<br><br>
      After you choose, you'll either win 10 points or lose 10 points. Your goal
      is to earn as many points as you can over the course of the task.<br><br>
      The three symbols don't pay off equally. Some win more often than others,
      and none wins every time. The same symbol can win on one trial and not the
      next.<br><br>
      Keep paying attention to how each one is doing throughout the entire task,
      since the best choice may not always be obvious. There's no single right
      choice.<br><br>
      You'll only learn the symbols by trying them out, so explore and use what
      you learn.<br><br>
      Every so often a short <strong>Bonus round</strong> appears. You'll see a
      picture, then a cross, then a white square. The moment the square appears,
      press <strong>any key</strong> as fast as you can to earn bonus points. Wait
      for the square: pressing too early doesn't count.<br><br>
      The whole task takes about 20 minutes.<br><br>
      Press <strong>Start</strong> when you are ready.
    </div>
    <div style="text-align:center">
      <button class="bandit-btn" id="start-btn">Start</button>
    </div>`,
  choices: "NO_KEYS",
  on_load: () => {
    document.getElementById('start-btn').addEventListener('click', () => {
      showHeader();
      updateHeader();
      jsPsych.finishTrial();
    });
  }
};

// ── 3. Trial unit ─────────────────────────────────────────────
function makeTrialUnit() {
  let _arm, _points, _outcome;

  const choice = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: () => `
      <div class="choice-prompt">Click a symbol to play</div>
      ${buildSlotGrid(false)}`,
    choices: "NO_KEYS",
    on_load: () => {
      S.started = true;        // q/Esc quit is now allowed
      updateHeader();          // show the current trial number (no overshoot)
      const t0 = performance.now();
      inactivityStart();
      let _choiceLate = false;  // flips true if the 4 s deadline passes before a click
      // After CHOICE_DEADLINE_MS with no choice, nudge the participant; the trial
      // still waits indefinitely for a click (inactivity system handles true stalls).
      const _deadline = setTimeout(() => {
        if (_quitting) return;
        _choiceLate = true;
        const p = document.querySelector('.choice-prompt');
        if (p) { p.textContent = 'Please answer faster.'; p.style.color = 'var(--red)'; }
      }, CFG.CHOICE_DEADLINE_MS);
      document.querySelectorAll('.slot-machine').forEach(el => {
        el.addEventListener('click', () => {
          if (_quitting) return;
          clearTimeout(_deadline);    // cancel the nudge once a choice is made
          inactivityClear();
          const arm = parseInt(el.dataset.arm);
          const rt  = performance.now() - t0;
          document.querySelectorAll('.slot-machine').forEach(m => {
            m.classList.add('disabled');
            m.style.pointerEvents = 'none';
          });
          el.classList.add('pulling');
          _animTO = setTimeout(() => {
            _animTO = null;
            if (_quitting) return;          // aborted mid-animation
            el.classList.remove('pulling');
            const result = registerChoice(arm, rt, _choiceLate);
            _arm     = arm;
            _points  = result.points;
            _outcome = result.outcome;
            jsPsych.finishTrial();
          }, CFG.ANIM_MS);
        });
      });
    },
    on_finish: () => { inactivityClear(); }
  };

  const feedback = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: () => buildBanditFeedback(_points, _outcome),
    choices: "NO_KEYS",
    trial_duration: CFG.FEEDBACK_MS,
    on_load: () => { pdFlash(); },   // photodiode pulse marks outcome onset for iEEG
  };

  const iti = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div style="min-height:200px"></div>`,
    choices: "NO_KEYS",
    trial_duration: CFG.ITI_MS,
  };

  return [choice, feedback, iti];
}

// ── Build timeline ───────────────────────────────────────────
function buildTimeline() {
  // Fix this session's food set (sweet or savory) once, before any image is drawn,
  // so cue and feedback images are consistent and the choice is logged as food_set.
  foodSet();

  // Schedule the 30 bonus events: shuffled food/neutral deck assigned to spread-out,
  // reversal-buffered bandit positions. Map: after bandit trial p, run bonus deck[i].
  const deck      = buildBonusDeck();
  const positions = buildBonusPositions(deck.length);
  const insertAt  = new Map();                     // bandit-trial index -> isFood
  positions.forEach((p, i) => insertAt.set(p, deck[i]));

  // Build the stream one bandit unit at a time (fresh closure per unit), dropping a
  // bonus trial in immediately after the scheduled bandit trials.
  const tl = [];
  for (let t = 1; t <= CFG.N_TRIALS; t++) {
    tl.push(...makeTrialUnit());
    if (insertAt.has(t)) tl.push(makeBonusTrial(insertAt.get(t)));
  }
  return tl;
}

// ── 4. End screen ─────────────────────────────────────────────
const end_trial = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: () => {
    document.getElementById('progress-fill').style.width = '100%';
    const bandit  = S.data.filter(d => d.trial_type === 'bandit');
    const n       = bandit.length;                                   // bonus rows excluded
    const nWin    = bandit.filter(d => d.outcome === 'reward').length;
    const nLoss   = bandit.filter(d => d.outcome === 'loss').length;
    const taskDur = S.taskStart
      ? ((performance.now() - S.taskStart) / 60000).toFixed(1) : '—';
    return `
      <div class="end-wrap">
        <div class="end-title">Great work! You finished the task.</div>
        <div class="end-score">Final score: ${S.score} pts</div>
        <div class="end-stat">Trials completed: ${n}</div>
        <div class="end-stat">Rewards: ${nWin} &nbsp;|&nbsp; Losses: ${nLoss}</div>
        <div class="end-stat">Bonus hits: ${S.bonusHits || 0} / ${S.bonusCount || 0}</div>
        <div class="end-stat">Total task time: ${taskDur} min</div>
        <div class="end-note">Your responses have been submitted. Thank you!</div>
      </div>`;
  },
  choices: "NO_KEYS",
  on_load: () => {
    exportCSV();   // save to Drive (or local fallback if no endpoint configured)
  }
};

// ── Quit & save ───────────────────────────────────────────────
let _quitting = false;
let _animTO   = null;   // pending choice-animation timeout (cleared on quit)
function quitAndSave() {
  if (_quitting || !S.started) return;
  _quitting = true;
  if (_animTO) { clearTimeout(_animTO); _animTO = null; }
  inactivityClear();
  exportCSV();                    // no-op if no trials completed yet
  jsPsych.endExperiment();
  const saved = S.data.length > 0;
  const display = document.querySelector('.jspsych-display-element') || document.body;
  display.innerHTML = `
    <div class="end-wrap" style="padding-top:100px">
      <div class="end-title" style="color:var(--gold)">Task Ended Early</div>
      <div class="end-score">Score so far: ${S.score} pts</div>
      <div class="end-stat">Trials completed: ${S.trial} / ${CFG.N_TRIALS}</div>
      <div class="end-note" style="margin-top:16px">${
        saved ? 'Your responses have been submitted.'
              : 'No trials were completed, so no data was saved.'}</div>
    </div>`;
}
// q / Esc quit. Ignore when typing in a text field (e.g. the participant-ID box).
document.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (S.inBonus) return;   // during a bonus round any key is a valid response, not a quit
  if (e.key === 'Escape' || e.key === 'q' || e.key === 'Q') {
    e.preventDefault();
    quitAndSave();
  }
});

// ── Run ───────────────────────────────────────────────────────
jsPsych.run([pid_trial, instructions_trial, ...buildTimeline(), end_trial]);
</script>
